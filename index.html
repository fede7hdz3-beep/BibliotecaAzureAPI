<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Biblioteca - Azure API</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        h1 { color: #2c3e50; text-align: center; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .search-container { text-align: center; margin-bottom: 20px; }
        input[type="text"] { padding: 10px; width: 300px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #3498db; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #7f8c8d; }
        tr:hover { background-color: #f1f1f1; }
        .disponible { color: green; font-weight: bold; }
        .no-disponible { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Panel de Control de la Biblioteca</h1>

    <div class="search-container">
        <input type="text" id="terminoBusqueda" placeholder="Buscar por título...">
        <button onclick="buscarLibros()">🔍 Buscar</button>
        <button onclick="cargarLibros()" style="background-color: #95a5a6;">🔄 Ver Todos</button>
    </div>

    <table id="tablaLibros">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>ISBN</th>
                <th>ID Autor</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            </tbody>
    </table>
</div>

<script>
    // URL de tu API en Visual Studio (ajusta el puerto si es necesario)
    // ANTES: const API_URL = 'https://localhost:7123/api/Libros';
// AHORA:
const API_URL = 'https://tu-codigo-nuevo.devtunnels.ms/api/Libros';

    // Función principal que se ejecuta al cargar la página
    window.onload = async () => {
        await obtenerLibros();
    };

    async function obtenerLibros() {
        const cuerpo = document.getElementById('cuerpoTabla');
        try {
            const respuesta = await fetch(API_URL);
            if (!respuesta.ok) throw new Error("Error en la API");
            
            const libros = await respuesta.json();
            console.log("Libros recibidos:", libros);
            
            llenarTabla(libros);
        } catch (error) {
            console.error("Error al conectar con Azure:", error);
            if(cuerpo) cuerpo.innerHTML = '<tr><td colspan="5" style="color:red">Error al conectar con el servidor. Dale Play en Visual Studio.</td></tr>';
        }
    }

    function llenarTabla(libros) {
        const cuerpo = document.getElementById('cuerpoTabla');
        if (!cuerpo) return;
        
        cuerpo.innerHTML = ''; 

        libros.forEach(libro => {
            // Mapeo flexible de nombres de columnas
            const id = libro.id_Libros || libro.id || "0";
            const titulo = libro.titulo || "Sin título";
            const isbn = libro.isbn || "N/A";
            const autor = libro.id_Autor || libro.autorId || "1";

            const fila = `
                <tr>
                    <td>${id}</td>
                    <td>${titulo}</td>
                    <td>${isbn}</td>
                    <td>${autor}</td>
                    <td><b style="color: #28a745;">✓ Disponible</b></td>
                </tr>
            `;
            cuerpo.innerHTML += fila;
        });
    }

    // Función de búsqueda (opcional)
    async function buscarLibro() {
        const query = document.getElementById('buscarInput').value;
        if (!query) return obtenerLibros();
        
        try {
            const res = await fetch(`${API_URL}/buscar?titulo=${query}`);
            const resultados = await res.json();
            llenarTabla(resultados);
        } catch (e) { console.error(e); }
    }
</script>

</body>
</html>
